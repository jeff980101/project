name: 每日自動化財經爬蟲

on:
  schedule:
    # 設定定時執行：這裡是 UTC 時間 0 點（台灣時間早上 8 點）
    - cron: '0 0 * * *'
  workflow_dispatch: # 保留這個，讓你可以隨時手動點擊執行按鈕

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 取得儲存庫程式碼
      uses: actions/checkout@v3

    - name: 🐍 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 安裝所需套件
      run: |
        python -m pip install --upgrade pip
        # 確保這行有加上 yfinance 和 pandas！
        pip install requests beautifulsoup4 yfinance pandas

    - name: 🕷️ 執行 Python 爬蟲
      run: python crawler.py

      # 👇 修改 2：新增這個區塊，請機器人接著執行財報爬蟲
    - name: 📊 執行 Python 財報爬蟲
      run: python fetch_financials.py

    - name: 💾 儲存並推播更新的 JSON 檔案
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        # 👇 修改 3：把原本的 git add news.json 改成 git add .
        # (git add . 結尾有一個小數點，代表「把所有變動的檔案都加進去」，這樣新聞和財報 JSON 就會一起存檔)
        git add .
        git commit -m "Auto-update news and financial data" || exit 0
        git push
